<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WSM-DUNAN CENTER</title>
    <link rel="icon" type="image/jpeg" href="./app_icon.jpg" />
    <link rel="manifest" href="./manifest.json" />
    <script>
      // Prevent Vite development HMR socket errors from crashing the preview or showing annoying error overlays
      (function() {
        const suppressWebSocketError = (e) => {
          const message = e.message || (e.reason && (e.reason.message || String(e.reason))) || '';
          if (
            message.toLowerCase().includes('websocket') || 
            message.toLowerCase().includes('failed to connect') ||
            (e.reason && String(e.reason).toLowerCase().includes('websocket'))
          ) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            console.warn('Suppressed benign HMR WebSocket/network error:', message);
            return true;
          }
          return false;
        };

        window.addEventListener('error', suppressWebSocketError, { capture: true });
        window.addEventListener('unhandledrejection', suppressWebSocketError, { capture: true });
      })();

      // Register service worker for installable PWA with cache-busting query parameter
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=26.9.0').then((reg) => {
            // Force service worker update check on every page load
            reg.update();
          }).catch((err) => {
            console.error('Service Worker registration failed:', err);
          });
        });
      }

      // Capture beforeinstallprompt event
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-prompt-available', { detail: e }));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
